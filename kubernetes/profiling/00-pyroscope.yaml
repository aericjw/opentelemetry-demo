# Pyroscope (single-binary) — OTLP profile sink for the AKS demo.
# Profiles in: OTLP/HTTP on :4040 path /v1/profiles
# UI:         HTTP on :4040  (port-forward or expose via Ingress as needed)
#
# Apply into the same namespace as the demo release, e.g.:
#   kubectl apply -n <demo-namespace> -f kubernetes/profiling/00-pyroscope.yaml

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pyroscope-data
  labels:
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/component: profiling
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
  # storageClassName: managed-csi   # uncomment to pin; otherwise uses the AKS default StorageClass

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pyroscope-config
  labels:
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/component: profiling
data:
  config.yaml: |
    target: all
    multitenancy_enabled: false

    server:
      http_listen_port: 4040
      grpc_listen_port: 9095

    storage:
      backend: filesystem
      filesystem:
        dir: /data/pyroscope

    pyroscopedb:
      data_path: /data/pyroscope/db

    limits:
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      max_global_series_per_tenant: 0
      max_query_lookback: 7d
      max_query_length: 24h

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  labels:
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/component: profiling
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pyroscope
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyroscope
        app.kubernetes.io/component: profiling
      annotations:
        oneagent.dynatrace.com/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsNonRoot: true
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.13.4
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/pyroscope/config.yaml
          ports:
            - name: http
              containerPort: 4040
              protocol: TCP
            - name: grpc
              containerPort: 9095
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/pyroscope
              readOnly: true
            - name: data
              mountPath: /data/pyroscope
      volumes:
        - name: config
          configMap:
            name: pyroscope-config
        - name: data
          persistentVolumeClaim:
            claimName: pyroscope-data

---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  labels:
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/component: profiling
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pyroscope
  ports:
    - name: http
      port: 4040
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9095
      targetPort: grpc
      protocol: TCP

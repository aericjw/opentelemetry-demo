apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: dynatrace-otel-k8s-monitoring
  name: dynatrace-otel-k8s-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dynatrace-otel-k8s-monitoring
  labels:
    app: dynatrace-otel-k8s-monitoring
rules:
  - apiGroups:
      - ""
    resources:
      - events
      - namespaces
      - namespaces/status
      - nodes
      - nodes/spec
      - nodes/stats
      - nodes/proxy
      - persistentvolumes
      - persistentvolumeclaims
      - pods
      - pods/status
      - replicationcontrollers
      - replicationcontrollers/status
      - resourcequotas
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dynatrace-otel-k8s-monitoring
  labels:
    app: dynatrace-otel-k8s-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dynatrace-otel-k8s-monitoring
subjects:
  - kind: ServiceAccount
    name: dynatrace-otel-k8s-monitoring
    namespace: astroshop
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: dynatrace-otel-k8s-monitoring
spec:
  serviceAccount: dynatrace-otel-k8s-monitoring
  envFrom:
  - secretRef:
      name: dynatrace-otelcol-dt-api-credentials
  env:
  - name: MY_POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: CLUSTER_NAME
    value: "aeric-walls-gke"
  mode: "daemonset"
  image: "ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector:0.46.0"
  resources:
    limits:
      memory: 512Mi
  config:
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      k8s_leader_elector:
        auth_type: "serviceAccount"
        lease_name: k8smonitoring
        lease_namespace: ${env:POD_NAMESPACE}

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
      k8s_events:
        auth_type: "serviceAccount"
        k8s_leader_elector: k8s_leader_elector
      kubeletstats:
        auth_type: "serviceAccount"
        collection_interval: 10s
        node: '${env:K8S_NODE_NAME}'
        extra_metadata_labels:
          - k8s.volume.type
        k8s_api_config:
          auth_type: "serviceAccount"
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metric_groups:
          - node
          - pod
          - container
          - volume
      k8s_cluster:
        auth_type: "serviceAccount"
        collection_interval: 10s
        k8s_leader_elector: k8s_leader_elector
        allocatable_types_to_report:
          - cpu
          - memory
          - pods
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - PIDPressure
          - DiskPressure
          - NetworkUnavailable
        metrics:
          k8s.node.condition:
            enabled: true
          k8s.pod.status_reason:
            enabled: true

    processors:
      cumulativetodelta:
        max_staleness: 25h
      filter:
        error_mode: ignore
        metrics:
          metric:
            - 'IsMatch(name, "k8s.volume.*") and resource.attributes["k8s.volume.type"] == nil'
            - 'resource.attributes["k8s.volume.type"] == "configMap"'
            - 'resource.attributes["k8s.volume.type"] == "emptyDir"'
            - 'resource.attributes["k8s.volume.type"] == "secret"'
      transform:
        error_mode: ignore
        trace_statements: &dynatrace_transformations
          # Set attributes taken from k8s metadata.
          - context: resource
            statements:
              - set(attributes["k8s.cluster.name"], "${env:CLUSTER_NAME}")
              - set(attributes["k8s.workload.kind"], "job") where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.job.name"]) where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.kind"], "cronjob") where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.cronjob.name"]) where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.kind"], "daemonset") where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.daemonset.name"]) where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.kind"], "statefulset") where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.statefulset.name"]) where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.kind"], "replicaset") where IsString(attributes["k8s.replicaset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.replicaset.name"]) where IsString(attributes["k8s.replicaset.name"])
              - set(attributes["k8s.workload.kind"], "deployment") where IsString(attributes["k8s.deployment.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.deployment.name"]) where IsString(attributes["k8s.deployment.name"])
              # remove the delete statements if you want to preserve these attributes
              - delete_key(attributes, "k8s.deployment.name")
              - delete_key(attributes, "k8s.replicaset.name")
              - delete_key(attributes, "k8s.statefulset.name")
              - delete_key(attributes, "k8s.daemonset.name")
              - delete_key(attributes, "k8s.cronjob.name")
              - delete_key(attributes, "k8s.job.name")
          # Set attributes from metadata specified in Dynatrace and set through the Dynatrace Operator.
          # For more info: https://docs.dynatrace.com/docs/shortlink/k8s-metadata-telemetry-enrichment
          - context: resource
            statements:
              - merge_maps(attributes, ParseJSON(attributes["metadata.dynatrace.com"]), "upsert") where IsMatch(attributes["metadata.dynatrace.com"], "^\\{")
              - delete_key(attributes, "metadata.dynatrace.com")
        metric_statements: *dynatrace_transformations
        log_statements: *dynatrace_transformations
      k8sattributes:
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.ip
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.job.name
            - k8s.cronjob.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.cluster.uid
            - k8s.container.name
          annotations:
            - from: pod
              key_regex: metadata.dynatrace.com/(.*)
              tag_name: $$1
            - from: pod
              key: metadata.dynatrace.com
              tag_name: metadata.dynatrace.com
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

    exporters:
      otlp_http:
        endpoint: ${env:DT_ENDPOINT}
        headers:
          Authorization: "Api-Token ${env:DT_API_TOKEN}"

    service:
      extensions:
        - health_check
        - k8s_leader_elector
      pipelines:
        metrics/node:
          receivers:
            - kubeletstats
          processors:
            - filter
            - k8sattributes
            - transform
            - cumulativetodelta
          exporters:
            - otlp_http
        metrics:
          receivers:
            - k8s_cluster
          processors:
            - k8sattributes
            - transform
            - cumulativetodelta
          exporters:
            - otlp_http
        logs:
          receivers:
            - k8s_events
          processors:
            - transform
          exporters:
            - otlp_http
        traces:
          receivers:
            - otlp
          processors:
            - k8sattributes
            - transform
          exporters:
            - otlp_http
      telemetry:
        metrics:
          # metrics verbosity level. Higher verbosity means more metrics.
          # The dashboard relies on metrics at level detailed.
          level: detailed
          # set up OTLP exporter
          readers:
            - periodic:
                interval: 60000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    temporality_preference: delta
                    endpoint: "${env:DT_ENDPOINT}/v1/metrics"
                    headers:
                      - name: Authorization
                        value: "Api-Token ${env:DT_API_TOKEN}"
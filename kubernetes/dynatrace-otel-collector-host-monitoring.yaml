apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: dynatrace-otel-host-monitoring-collector
  name: dynatrace-otel-host-monitoring-collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dynatrace-otel-host-monitoring-collector
  labels:
    app: dynatrace-otel-host-monitoring-collector
rules:
  - apiGroups:
      - ''
    resources:
      - 'pods'
      - 'namespaces'
    verbs:
      - 'get'
      - 'watch'
      - 'list'
  - apiGroups:
      - 'apps'
    resources:
      - 'replicasets'
    verbs:
      - 'get'
      - 'list'
      - 'watch'
  - apiGroups:
      - 'extensions'
    resources:
      - 'replicasets'
    verbs:
      - 'get'
      - 'list'
      - 'watch'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dynatrace-otel-host-monitoring-collector
  labels:
    app: dynatrace-otel-host-monitoring-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dynatrace-otel-host-monitoring-collector
subjects:
  - kind: ServiceAccount
    name: dynatrace-otel-host-monitoring-collector
    namespace: astroshop
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: dynatrace-otel-host-monitoring
spec:
  serviceAccount: dynatrace-otel-host-monitoring-collector
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
    runAsUser: 0
    capabilities:
      drop:
        - ALL
      add:
        - DAC_READ_SEARCH
        - SYS_PTRACE
  volumeMounts:
    - name: run-journal
      mountPath: /run/log/journal
      readOnly: true

  volumes:
    - name: run-journal
      hostPath:
        path: /run/log/journal
  envFrom:
  - secretRef:
      name: dynatrace-otelcol-dt-api-credentials
  env:
  - name: MY_POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  - name: CLUSTER_NAME
    value: "aeric-walls-gke"
  mode: "daemonset"
  image: "ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector:0.48.0"
  resources:
    limits:
      memory: 512Mi
  config:
    # OpenTelemetry Collector Configuration for Host Monitoring
    #
    # This configuration is tailored for the Dynatrace OpenTelemetry Host Extension (custom:opentelemetry) and Host Monitoring.
    # Only metrics used by the extension and dashboard are enabled to minimize data volume and cardinality.
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      hostmetrics/1m:
        collection_interval: 1m
        scrapers:
          # CPU metrics
          cpu:
            metrics:
              system.cpu.utilization:
                enabled: true
              system.cpu.time:
                enabled: false

          # Memory metrics
          memory:
            metrics:
              system.memory.utilization:
                enabled: true
              system.memory.usage:
                enabled: false

          # Load average metrics
          load:
            metrics:
              system.cpu.load_average.1m:
                enabled: true
              system.cpu.load_average.5m:
                enabled: false
              system.cpu.load_average.15m:
                enabled: false

      hostmetrics/5m:
        collection_interval: 5m
        scrapers:
          # CPU metrics
          cpu:
            metrics:
              system.cpu.time:
                enabled: true

          # Memory metrics
          memory:
            metrics:
              system.memory.usage:
                enabled: true

          # Paging/Swap metrics
          paging:
            metrics:
              system.paging.usage:
                enabled: true
              system.paging.operations:
                enabled: true
              system.paging.faults:
                enabled: true

          # Network metrics
          network:
            metrics:
              system.network.io:
                enabled: true
              system.network.packets:
                enabled: true
              system.network.errors:
                enabled: true
              system.network.connections:
                enabled: true
              system.network.dropped:
                enabled: true

          # Load average metrics
          load:
            metrics:
              system.cpu.load_average.1m:
                enabled: false
              system.cpu.load_average.5m:
                enabled: true
              system.cpu.load_average.15m:
                enabled: true

          # Disk metrics
          disk:
            metrics:
              system.disk.io:
                enabled: true
              system.disk.operations:
                enabled: true
              system.disk.io_time:
                enabled: true
              system.disk.operation_time:
                enabled: true
              system.disk.pending_operations:
                enabled: false
              system.disk.merged:
                enabled: false
              system.disk.weighted_io_time:
                enabled: false

          # Filesystem metrics
          filesystem:
            metrics:
              system.filesystem.usage:
                enabled: true
              system.filesystem.utilization:
                enabled: true
              system.filesystem.inodes.usage:
                enabled: true

          # Process count metrics
          processes:
            metrics:
              system.processes.count:
                enabled: true
              system.processes.created:
                enabled: true

          # Per-process metrics
          process:
            mute_process_all_errors: true
            metrics:
              process.cpu.utilization:
                enabled: true
              process.cpu.time:
                enabled: true
              process.memory.usage:
                enabled: true
              process.memory.virtual:
                enabled: true
              process.disk.io:
                enabled: true

      hostmetrics/1h:
        collection_interval: 1h
        scrapers:
          # Memory metrics
          memory:
            metrics:
              system.memory.limit:
                enabled: true
              system.memory.usage:
                enabled: false

          # CPU metrics
          cpu:
            metrics:
              system.cpu.logical.count:
                enabled: true
              system.cpu.physical.count:
                enabled: true
              system.cpu.time:
                enabled: false

          # System metrics
          system:
            metrics:
              system.uptime:
                enabled: true

    processors:
      filter:
        metrics:
          datapoint:
            - metric.name == "system.cpu.utilization" and attributes["state"] == "idle"
      transform:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              # Mark process metrics for deletion if the process uses less than 1 MiB of memory (value_int < 1048576 bytes).
              # Adjust the threshold to your needs (e.g. 10485760 for 10 MiB).
              # This filters out low-memory/insignificant processes to reduce cardinality.
              - set(resource.attributes["low-memory-process"], "true") where metric.name == "process.memory.usage" and value_int < 1048576 and resource.attributes["process.executable.name"] != nil

              # Allowlist: uncomment and add process executable names to always ingest regardless of memory usage.
              # For regex pattern matching, use IsMatch() instead, e.g.: IsMatch(resource.attributes["process.executable.name"], "java.*")
              # - delete_key(resource.attributes, "low-memory-process") where ContainsValue(["my-process", "another-process"], resource.attributes["process.executable.name"])
          - context: resource
            statements:
              # Replace spaces in process command line with underscores for cleaner entity IDs
              - replace_pattern(resource.attributes["process.command_line"], " ", "_")
              # Convert host.ip from array to first value of array to avoid the metric being dropped
              - set(resource.attributes["host.ip"], resource.attributes["host.ip"][0]) where resource.attributes["host.ip"] != nil

          - context: datapoint
            statements:
              # For process.* metrics, keep only the attributes needed by the OpenTelemetry Host extension and remove the rest
              - delete_key(resource.attributes, "process.cgroup") where IsMatch(metric.name, "^process\\..*")
              - delete_key(resource.attributes, "process.command") where IsMatch(metric.name, "^process\\..*")
              - delete_key(resource.attributes, "process.executable.path") where IsMatch(metric.name, "^process\\..*")
              - delete_key(resource.attributes, "process.owner") where IsMatch(metric.name, "^process\\..*")
              - delete_key(resource.attributes, "process.parent_pid") where IsMatch(metric.name, "^process\\..*")
              - delete_key(resource.attributes, "process.pid") where IsMatch(metric.name, "^process\\..*")
              - delete_key(resource.attributes, "process.command_line") where IsMatch(metric.name, "^process\\..*")
              - delete_key(resource.attributes, "process.command_args") where IsMatch(metric.name, "^process\\..*")

              # Delete empty device attributes
              - delete_key(datapoint.attributes, "device") where datapoint.attributes["device"] == ""

              - delete_key(datapoint.attributes, "protocol") where IsMatch(metric.name, "^system\\.network\\..*")

              # Filesystem metrics: Extension uses mountpoint and state, but not device, mode, or type
              - delete_key(datapoint.attributes, "device") where IsMatch(metric.name, "^system\\.filesystem\\..*")
              - delete_key(datapoint.attributes, "mode") where IsMatch(metric.name, "^system\\.filesystem\\..*")
              - delete_key(datapoint.attributes, "type") where IsMatch(metric.name, "^system\\.filesystem\\..*")

          - context: metric
            statements:
              - aggregate_on_attributes("sum", ["cpu"]) where metric.name == "system.cpu.utilization"

          - context: datapoint
            statements:
              - delete_key(datapoint.attributes, "cpu") where metric.name == "system.cpu.utilization"

          - context: metric
            statements:
              # Average remaining datapoints (one per core) into a single host-level value
              - aggregate_on_attributes("mean") where metric.name == "system.cpu.utilization"

      filter/delete-metrics:
        metric_conditions:
          - resource.attributes["low-memory-process"] != nil

      batch:
        send_batch_size: 3000
        send_batch_max_size: 3000
        timeout: 60s
      cumulativetodelta:
        max_staleness: 25h
      resourcedetection:
        detectors: ["system"]
        system:
          resource_attributes:
            host.arch:
              enabled: true
            host.id:
              enabled: true
            host.name:
              enabled: true
            host.ip:
              enabled: true
            host.interface:
              enabled: true
            host.mac:
              enabled: true
            host.cpu.model.name:
              enabled: true
            host.cpu.vendor.id:
              enabled: false
            host.cpu.family:
              enabled: false
            host.cpu.model.id:
              enabled: false
            host.cpu.stepping:
              enabled: false
            host.cpu.cache.l2.size:
              enabled: false
            os.type:
              enabled: true
            os.description:
              enabled: true
            os.name:
              enabled: true
            os.version:
              enabled: true
            os.build.id:
              enabled: true

    exporters:
      otlp_http:
        endpoint: "${env:DT_ENDPOINT}"
        headers:
          Authorization: "Api-Token ${env:DT_API_TOKEN}"

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [hostmetrics/1m, hostmetrics/5m, hostmetrics/1h]
          processors: [filter, resourcedetection, transform, filter/delete-metrics, cumulativetodelta, batch]
          exporters: [otlp_http]
      telemetry:
        metrics:
          # metrics verbosity level. Higher verbosity means more metrics.
          # The dashboard relies on metrics at level detailed.
          level: detailed
          # set up OTLP exporter
          readers:
            - periodic:
                interval: 60000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    temporality_preference: delta
                    endpoint: "${env:DT_ENDPOINT}/v1/metrics"
                    headers:
                      - name: Authorization
                        value: "Api-Token ${env:DT_API_TOKEN}"
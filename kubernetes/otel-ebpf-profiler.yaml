#
# eBPF continuous profiler DaemonSet.
#
# Runs one profiler pod per Linux node so profiling coverage scales
# automatically with cluster autoscaling.
#
# Profile pipeline:
#   eBPF profiler  --OTLP/gRPC-->  astroshop-otel-collector  --OTLP/gRPC-->  firepit
#
# Deploy alongside the Helm release:
#   kubectl apply -n astroshop -f kubernetes/otel-ebpf-profiler.yaml
#
# The otel-collector profiles pipeline (otlp_grpc/firepit exporter) is already
# configured in kubernetes/my-values-file.yaml.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-ebpf-profiler-config
  labels:
    app.kubernetes.io/name: otel-ebpf-profiler
    app.kubernetes.io/part-of: opentelemetry-demo
data:
  otelcol-ebpf-profiling.yml: |
    receivers:
      profiling:
        samples_per_second: 19
        include_env_vars: "OTEL_SERVICE_NAME"

    processors:
      transform/set_service_name:
        error_mode: ignore
        profile_statements:
          - context: resource
            statements:
              - set(attributes["service.name"], attributes["process.environment_variable.OTEL_SERVICE_NAME"]) where attributes["process.environment_variable.OTEL_SERVICE_NAME"] != nil
              - delete_key(attributes, "process.environment_variable.OTEL_SERVICE_NAME")

    exporters:
      otlp_grpc/collector:
        endpoint: otel-collector:4317
        tls:
          insecure: true

    service:
      pipelines:
        profiles:
          receivers: [profiling]
          processors: [transform/set_service_name]
          exporters: [otlp_grpc/collector]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-ebpf-profiler
  labels:
    app.kubernetes.io/name: otel-ebpf-profiler
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-ebpf-profiler
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-ebpf-profiler
        app.kubernetes.io/part-of: opentelemetry-demo
      annotations:
        oneagent.dynatrace.com/inject: "false"
    spec:
      # Required: eBPF profiler must see all host processes to profile them
      hostPID: true
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        # Run on autoscaled nodes that may carry the default taint before workloads land
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: otel-ebpf-profiler
          image: otel/opentelemetry-collector-ebpf-profiler:0.151.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/ebpf-profiler-config.yaml
            - --feature-gates=service.profilesSupport
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/ebpf-profiler-config.yaml
              subPath: otelcol-ebpf-profiling.yml
              readOnly: true
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
            - name: sys-kernel-tracing
              mountPath: /sys/kernel/tracing
            - name: sys-fs-cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-ebpf-profiler-config
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: sys-kernel-tracing
          hostPath:
            path: /sys/kernel/tracing
        - name: sys-fs-cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: proc
          hostPath:
            path: /proc

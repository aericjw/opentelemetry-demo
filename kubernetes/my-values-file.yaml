default:
  image:
    pullPolicy: Always
    tag: main
    repository: aericjw/opentelemetry-demo
  envOverrides:
    - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      value: "delta"
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "primary_tags.app=astroshop,primary_tags.team=agentic-aeric,primary_tags.environment=azure,dt.cost.product=$(OTEL_SERVICE_NAME),dt.cost.costcenter=astroshop,dt.security_context=$(OTEL_SERVICE_NAME)"

components:
  accounting:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 500Mi
      limits:
        memory: 500Mi
  ad:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 300Mi
  cart:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  checkout:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  currency:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  email:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  flagd:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    imageOverride:
      repository: "ghcr.io/open-feature/flagd"
      tag: "v0.14.2"
  fraud-detection:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 300Mi
  frontend:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    envOverrides:
      - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
        value: "http://astroshop.westus2.cloudapp.azure.com:8080/otlp-http"
  frontend-proxy:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    envOverrides:
      - name: TELEMETRY_DOCS_HOST
        value: "telemetry-docs"
      - name: TELEMETRY_DOCS_PORT
        value: "8080"
      - name: FIREPIT_HOST
        value: "firepit"
      - name: FIREPIT_PORT
        value: "8080"
      - name: CHATBOT_HOST
        value: "chatbot"
      - name: CHATBOT_PORT
        value: "7860"
      - name: OPAMP_SERVER_HOST
        value: "opamp-server"
      - name: OPAMP_SERVER_UI_PORT
        value: "4321"
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-dns-label-name: astroshop
  image-provider:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  kafka:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        cpu: 1000m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 1Gi
  load-generator:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 5000m
        memory: 8Gi
    envOverrides:
    - name: LOCUST_USERS
      value: "10"
  payment:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    envOverrides:
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: grpc
  shipping:
    envOverrides:
      # Rust binary uses the OTLP HTTP exporter; point it at the collector's
      # HTTP port (4317 is gRPC-only and rejects HTTP with "bogus greeting").
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
  checkout:
    envOverrides:
      # Go otlp*http exporters need the collector's HTTP port, not gRPC 4317.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
  product-catalog:
    # product-catalog uses the otelconf declarative-config SDK, which is a no-op
    # unless OTEL_CONFIG_FILE points at a config file (compose mounts otel-config.yml;
    # the k8s deployment was missing it). The config uses otlp_grpc, so the endpoint
    # must be the gRPC port 4317.
    envOverrides:
      - name: OTEL_CONFIG_FILE
        value: /otel-config.yml
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
    mountedConfigMaps:
      - name: otel-config
        mountPath: /otel-config.yml
        subPath: otel-config.yml
        data:
          otel-config.yml: |
            file_format: "1.0"
            disabled: false
            log_level: info
            logger_provider:
              processors:
                - batch:
                    exporter:
                      otlp_grpc:
                        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
            meter_provider:
              readers:
                - periodic:
                    exporter:
                      otlp_grpc:
                        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
                        temporality_preference: ${OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE:-delta}
            tracer_provider:
              processors:
                - batch:
                    exporter:
                      otlp_grpc:
                        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
            propagator:
              composite:
                - tracecontext:
                - baggage:
            resource:
              attributes_list: ${OTEL_RESOURCE_ATTRIBUTES}
              detection/development:
                detectors:
                  - container:
                  - host:
                  - process:
                  - service:
  mcp:
    envOverrides:
      # Traceloop SDK exports OTLP over HTTP; use the HTTP port, not gRPC 4317.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
  postgresql:
    command:
      - "docker-entrypoint.sh"
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "track_activity_query_size=4096"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track_utility=off"
      - "-c"
      - "track_io_timing=on"
      - "-c"
      - "plan_cache_mode=force_generic_plan"
    # The three POSTGRES_* vars mirror the chart defaults and MUST be repeated:
    # Helm replaces (does not merge) list-valued keys, so declaring `env` here
    # overrides the chart's list entirely. DYNATRACE_PASSWORD is injected from a
    # Secret and consumed by src/postgresql/zz-dynatrace.sql to create the
    # 'dynatrace' monitoring user without exposing the password in the ConfigMap.
    env:
      - name: POSTGRES_USER
        value: root
      - name: POSTGRES_PASSWORD
        value: otel
      - name: POSTGRES_DB
        value: otel
      - name: DYNATRACE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: dynatrace-db-password
            key: password
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-dns-label-name: astroshop-postgres
  product-catalog:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  quote:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  recommendation:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  shipping:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    envOverrides:
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"
      - name: FLAGD_OFREP_PORT
        value: "8016"
  valkey-cart:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"

  # ---------------------------------------------------------------------------
  # Repo-custom services (NOT part of the upstream opentelemetry-demo chart).
  # The chart's `components` map is generic, so each entry below renders a
  # Deployment + Service. Images use the default repo/tag convention
  # (aericjw/opentelemetry-demo:main-<component>); firepit uses an upstream
  # image override. frontend-proxy is already wired to these hosts/ports above.
  # ---------------------------------------------------------------------------
  telemetry-docs:
    enabled: true
    useDefault:
      env: true
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    service:
      port: 8080
    resources:
      requests:
        memory: 100Mi
      limits:
        memory: 100Mi
    env:
      # nginx OTel module reads host/port directly (not OTEL_EXPORTER_OTLP_ENDPOINT)
      - name: TELEMETRY_DOCS_PORT
        value: "8080"
      - name: OTEL_COLLECTOR_HOST
        value: otel-collector
      - name: OTEL_COLLECTOR_PORT_GRPC
        value: "4317"

  firepit:
    enabled: true
    useDefault:
      env: false
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    imageOverride:
      repository: ghcr.io/florianl/firepit
      tag: v0.1.0
    env:
      - name: BASE_PATH
        value: /profiles
    ports:
      - name: http
        value: 8080
      - name: otlp-grpc
        value: 4317
  opamp-server:
    enabled: true
    useDefault:
      env: false
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 65Mi
      limits:
        memory: 65Mi
    ports:
      - name: http
        value: 4321
      - name: opamp
        value: 4320
  agent:
    enabled: true
    useDefault:
      env: true
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    service:
      port: 8010
    resources:
      requests:
        memory: 500Mi
      limits:
        memory: 500Mi
    env:
      - name: AGENT_ENDPOINT
        value: agent
      - name: AGENT_PORT
        value: "8010"
      - name: MCP_ENDPOINT
        value: mcp
      - name: MCP_PORT
        value: "8011"
      - name: MCP_ENABLED
        value: "True"
      - name: GRAPH_RECURSION_LIMIT
        value: "25"
      - name: APPLICATION_ENDPOINT
        value: frontend:8080
      # VCR cassettes are a Compose volume (not baked into the image), so use a
      # real LLM on AKS via the anthropic-api-key secret.
      - name: USE_VCR
        value: "False"
      - name: LLM_TLS_VERIFY
        value: "False"
      - name: LLM_BASE_URL
        value: "https://api.anthropic.com/v1/"
      - name: LLM_MODEL
        value: claude-haiku-4-5
      - name: API_KEY
        valueFrom:
          secretKeyRef:
            name: anthropic-api-key
            key: ANTHROPIC_API_KEY
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: anthropic-api-key
            key: ANTHROPIC_API_KEY
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: $(OTEL_COLLECTOR_NAME):4317
      - name: OTEL_EXPORTER_OTLP_INSECURE
        value: "true"

  mcp:
    enabled: true
    useDefault:
      env: true
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    service:
      port: 8011
    resources:
      requests:
        memory: 500Mi
      limits:
        memory: 500Mi
    env:
      - name: MCP_ENDPOINT
        value: mcp
      - name: MCP_PORT
        value: "8011"
      - name: APPLICATION_ENDPOINT
        value: frontend:8080
      # FastMCP 3.x rejects requests whose Host header is not trusted (DNS
      # rebinding protection), returning 421 Misdirected Request. The agent
      # reaches this server in-cluster as http://mcp:8011/mcp, so trust that host.
      - name: FASTMCP_HTTP_ALLOWED_HOSTS
        value: '["mcp", "mcp:8011", "localhost", "127.0.0.1"]'
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: $(OTEL_COLLECTOR_NAME):4317
      - name: OTEL_EXPORTER_OTLP_INSECURE
        value: "true"

  chatbot:
    enabled: true
    useDefault:
      env: true
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    service:
      port: 7860
    resources:
      requests:
        memory: 500Mi
      limits:
        memory: 500Mi
    env:
      - name: CHATBOT_PORT
        value: "7860"
      - name: CHATBOT_ROOT_PATH
        value: /chatbot
      - name: AGENT_ENDPOINT
        value: agent
      - name: AGENT_PORT
        value: "8010"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: $(OTEL_COLLECTOR_NAME):4317
      - name: OTEL_EXPORTER_OTLP_INSECURE
        value: "true"

opensearch:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opentelemetry-collector:
  enabled: true
  command:
    extraArgs:
      - --feature-gates=service.profilesSupport
  presets:
      hostMetrics:
        enabled: false
      kubernetesAttributes:
        enabled: false
      kubeletMetrics:
        enabled: false
      clusterMetrics:
        enabled: false
      annotationDiscovery:
        metrics:
          enabled: false
  resources:
    limits:
      memory: 300Mi
  service:
    enabled: true
  ports:
    metrics:
      enabled: true
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    zipkin:
      enabled: false
  config:
    receivers:
      otlp:
        protocols:
          http:
            # Since this collector needs to receive data from the web, enable cors for all origins
            # `allowed_origins` can be refined for your deployment domain
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
      kafkametrics:
        scrapers:
          - brokers
          - topics
          - consumers
        brokers:
          - kafka:9092
        collection_interval: 10s

    exporters:
      otlp:
        endpoint: "bindplane-gateway-agent.bindplane-agent.svc.cluster.local:4317"
        tls:
          insecure: true
      otlp_grpc/firepit:
        endpoint: "firepit:4317"
        tls:
          insecure: true
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 2000

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      resourcedetection:
        detectors: [env, system, aks, azure]
      k8sattributes:
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.ip
            - k8s.pod.hostname
            - k8s.pod.start_time
            - k8s.deployment.uid
            - k8s.deployment.name
            - k8s.replicaset.uid
            - k8s.replicaset.name
            - k8s.statefulset.uid
            - k8s.statefulset.name
            - k8s.daemonset.uid
            - k8s.daemonset.name
            - k8s.job.uid
            - k8s.job.name
            - k8s.cronjob.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - container.image.name
            - container.image.tag
            - container.image.repo_digests
          annotations:
            - from: pod
              key_regex: metadata.dynatrace.com/(.*)
              tag_name: $$1
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
      resource:
        attributes:
        - key: service.instance.id
          from_attribute: k8s.pod.uid
          action: insert
      transform/sanitize:
        error_mode: ignore
        trace_statements:
          # Sanitize spans to prevent span metrics cardinality explosion
          # caused by non-compliant high cardinality span names:
          # 1. Define missing http.route on key HTTP operations for meaningful operation names
          # 2. Then normalize span names; http server spans lacking http.route default to operations "GET", "POST", etc.
          - context: span
            # FRONTEND SERVICE
            conditions:
              - span.kind == SPAN_KIND_SERVER and resource.attributes["service.name"] == "frontend" and span.attributes["http.route"] == nil
            statements:
              # Workaround for Next.js high cardinality span name issue: https://github.com/vercel/next.js/issues/54694
              - set(span.attributes["http.route"], "/api/cart") where IsMatch(span.attributes["http.target"], "\\/api\\/cart")  # e.g. # /api/cart
              - set(span.attributes["http.route"], "/api/checkout") where IsMatch(span.attributes["http.target"], "\\/api\\/checkout")  # e.g. # /api/checkout
              - set(span.attributes["http.route"], "/api/products/{productId}") where IsMatch(span.attributes["http.target"], "\\/api\\/products\\/.*")  # e.g. /api/products/1YMWWN1N4O
              - set(span.attributes["http.route"], "/api/recommendations") where IsMatch(span.attributes["http.target"], "\\/api\\/recommendations")  # e.g. # /api/recommendations?productIds=...
              - set(span.attributes["http.route"], "/api/data") where IsMatch(span.attributes["http.target"], "\\/api\\/data.*")  # e.g. # " /api/data?contextKeys=telescopes" or /api/data/?contextKeys=cameras
          - context: span
            statements:
              # SANITIZE ALL SPAN NAMES TO PREVENT CARDINALITY EXPLOSION
              - set_semconv_span_name("1.37.0", "unsanitized_span_name")
      transform/dynatrace:
        error_mode: ignore
        trace_statements: &dynatrace_transformations
          - context: resource
            statements:
              - set(attributes["k8s.workload.kind"], "job") where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.job.name"]) where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.kind"], "cronjob") where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.cronjob.name"]) where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.kind"], "daemonset") where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.daemonset.name"]) where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.kind"], "statefulset") where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.statefulset.name"]) where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.kind"], "replicaset") where IsString(attributes["k8s.replicaset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.replicaset.name"]) where IsString(attributes["k8s.replicaset.name"])
              - set(attributes["k8s.workload.kind"], "deployment") where IsString(attributes["k8s.deployment.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.deployment.name"]) where IsString(attributes["k8s.deployment.name"])
        metric_statements: *dynatrace_transformations
        log_statements: *dynatrace_transformations
      filter/profiles:
        error_mode: ignore
        profile_conditions:
          - resource.attributes["k8s.namespace.name"] != "astroshop"
      cumulativetodelta:
        max_staleness: 25h
    
    connectors:
      spanmetrics: {}

    extensions:
      opamp:
        server:
          ws:
            endpoint: wss://opamp-server:4320/v1/opamp

    service:
      pipelines:
        traces:
          processors: [memory_limiter, resourcedetection, k8sattributes, resource, transform/sanitize, transform/dynatrace]
          exporters: [otlp, spanmetrics, debug]
        metrics:
          receivers: [otlp, kafkametrics, spanmetrics]
          processors: [memory_limiter, resourcedetection, k8sattributes, resource, transform/dynatrace, cumulativetodelta]
          exporters: [otlp, debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, k8sattributes, resource, transform/dynatrace]
          exporters: [otlp, debug]
        profiles:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, k8sattributes, resource, filter/profiles]
          exporters: [otlp_grpc/firepit, debug]
      telemetry:
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 60000
                exporter:
                  otlp:
                    temporality_preference: delta
                    protocol: http/protobuf
                    endpoint: "http://bindplane-gateway-agent.bindplane-agent.svc.cluster.local:4318"
        logs:
          level: debug
          encoding: json
          processors:
            - batch:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: "http://bindplane-gateway-agent.bindplane-agent.svc.cluster.local:4318"
        traces:
          processors:
            - batch:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: "http://bindplane-gateway-agent.bindplane-agent.svc.cluster.local:4318"

# helm upgrade astroshop kubernetes/_chart-cache/opentelemetry-demo -f kubernetes/my-values-file.yaml -n astroshop
default:
  image:
    pullPolicy: Always
components:
  accounting:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 500Mi
      limits:
        memory: 500Mi
  ad:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 300Mi
  cart:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  checkout:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  currency:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  email:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  flagd:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  fraud-detection:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 300Mi
  frontend:
    imageOverride:
      repository: "aericjw/opentelemetry-demo"
      tag: "latest-frontend"
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  frontend-proxy:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-dns-label: "aeric-otel-demo"
  image-provider:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  kafka:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        cpu: 1000m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 1Gi
  llm:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  load-generator:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    envOverrides:
    - name: LOCUST_USERS
      value: "10"
  payment:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  postgresql:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-dns-label: "aeric-postgresql"
  product-catalog:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  product-reviews:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
    resources:
      requests:
        memory: 200Mi
      limits:
        memory: 200Mi
    imageOverride:
      repository: "aericjw/opentelemetry-demo"
      tag: "latest-product-reviews"
    envOverrides:
    - name: LLM_BASE_URL
      value: "https://api.openai.com/v1"
    - name: LLM_MODEL
      value: gpt-4o-mini
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: openai-api-key
          key: OPENAI_API_KEY
  quote:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  recommendation:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  shipping:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
  valkey-cart:
    podAnnotations:
      oneagent.dynatrace.com/inject: "false"
opensearch:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opentelemetry-collector:
  enabled: true
  presets:
      hostMetrics:
        enabled: false
      kubernetesAttributes:
        enabled: false
      kubeletMetrics:
        enabled: false
      clusterMetrics:
        enabled: false
      annotationDiscovery:
        metrics:
          enabled: false
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            cors:
              allowed_origins:
              - http://*
              - https://*
            endpoint: ${env:MY_POD_IP}:4318
    processors:
      k8sattributes:
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.ip
            - k8s.pod.hostname
            - k8s.pod.start_time
            - k8s.deployment.uid
            - k8s.deployment.name
            - k8s.replicaset.uid
            - k8s.replicaset.name
            - k8s.statefulset.uid
            - k8s.statefulset.name
            - k8s.daemonset.uid
            - k8s.daemonset.name
            - k8s.job.uid
            - k8s.job.name
            - k8s.cronjob.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - container.image.name
            - container.image.tag
            - container.image.repo_digests
          annotations:
            - from: pod
              key_regex: metadata.dynatrace.com/(.*)
              tag_name: $$1
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
      transform:
        error_mode: ignore
        trace_statements: &dynatrace_transformations
          - context: resource
            statements:
              - set(attributes["k8s.workload.kind"], "job") where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.job.name"]) where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.kind"], "cronjob") where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.cronjob.name"]) where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.kind"], "daemonset") where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.daemonset.name"]) where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.kind"], "statefulset") where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.statefulset.name"]) where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.kind"], "replicaset") where IsString(attributes["k8s.replicaset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.replicaset.name"]) where IsString(attributes["k8s.replicaset.name"])
              - set(attributes["k8s.workload.kind"], "deployment") where IsString(attributes["k8s.deployment.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.deployment.name"]) where IsString(attributes["k8s.deployment.name"])
        metric_statements: *dynatrace_transformations
        log_statements: *dynatrace_transformations
      cumulativetodelta: {}
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      batch:
        send_batch_size: 10000
        timeout: 10s
      resourcedetection/aks:
        detectors: [env, azure, aks, system]
        timeout: 2s
        override: false
    exporters:
      otlphttp:
        endpoint: "${env:DT_ENDPOINT}"
        headers:
          Authorization: "Api-Token ${env:DT_API_TOKEN}"
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 2000
    
    connectors:
      spanmetrics: {}
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
        path: "/"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection/aks, k8sattributes, transform, batch]
          exporters: [otlphttp, spanmetrics]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [memory_limiter, cumulativetodelta, resourcedetection/aks, k8sattributes, transform, batch]
          exporters: [otlphttp]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection/aks, k8sattributes, transform, batch]
          exporters: [otlphttp]
      extensions:
      - health_check

      # turn on self-monitoring
      telemetry:
        metrics:
          # metrics verbosity level. Higher verbosity means more metrics.
          # The dashboard relies on metrics at level detailed.
          level: detailed
          # set up OTLP exporter
          readers:
            - periodic:
                interval: 60000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    temporality_preference: delta
                    endpoint: "${env:DT_ENDPOINT}/v1/metrics"
                    headers:
                      - name: Authorization
                        value: "Api-Token ${env:DT_API_TOKEN}"

  extraEnvs: []
  extraEnvsFrom:
    - secretRef:
        name: dynatrace-otelcol-dt-api-credentials

  # Configuration for ports
  # nodePort is also allowed
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 4317
      protocol: TCP
      appProtocol: grpc
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      hostPort: 4318
      protocol: TCP
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    zipkin:
      enabled: false
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
    health:
      containerPort: 13133
      servicePort: 13133
      protocol: TCP
      enabled: true

  useGOMEMLIMIT: true

  resources:
    limits:
      memory: 512Mi

  podAnnotations:
    metrics.dynatrace.com/port: "8888"
    metrics.dynatrace.com/scrape: "true"
    oneagent.dynatrace.com/inject: "false"
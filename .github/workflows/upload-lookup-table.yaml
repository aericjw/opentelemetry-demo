name: Upload Dynatrace Lookup Table

on:
  workflow_dispatch:
    inputs:
      grail_file_path:
        description: "Grail file path (must start with /lookups, e.g. /lookups/mydata)"
        required: true
        type: string
      repo_file_path:
        description: "Repo-relative path to the lookup data file"
        required: true
        default: "lookups/table.csv"
        type: string
      parse_pattern:
        description: "DPL pattern to parse uploaded data (e.g. LD:id ',' LD:value)"
        required: true
        type: string
      lookup_field:
        description: "Field name whose value uniquely identifies a record"
        required: true
        type: string
      overwrite:
        description: "Overwrite the file if it already exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      display_name:
        description: "Optional display name for the file (max 500 chars)"
        required: false
        type: string
      description:
        description: "Optional description for the file (max 500 chars)"
        required: false
        type: string
      skipped_records:
        description: "Number of initial records to discard (e.g. to skip header rows). Default: 0"
        required: false
        default: "0"
        type: string
      timezone:
        description: "Timezone for parsing time/date fields (IANA TZDB, e.g. UTC)"
        required: false
        type: string
      locale:
        description: "Locale for parsing day/month names (e.g. en_US)"
        required: false
        type: string
      auto_flatten:
        description: "Extract nested fields to root level when DPL pattern yields a single record-type field"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# Required repository secrets:
#   DT_OAUTH_CLIENT_ID     — OAuth client ID from Dynatrace account management
#   DT_OAUTH_CLIENT_SECRET — OAuth client secret
#   DT_ENVIRONMENT_URL     — e.g. https://<env-id>.apps.dynatrace.com (no trailing slash)
#
# OAuth client must be granted the following scopes:
#   storage:lookup-tables:read
#   storage:lookup-tables:write

jobs:
  upload-lookup-table:
    name: Upload lookup table to Dynatrace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Obtain Bearer Token (OAuth2 client credentials)
        id: auth
        env:
          DT_OAUTH_CLIENT_ID: ${{ secrets.DT_OAUTH_CLIENT_ID }}
          DT_OAUTH_CLIENT_SECRET: ${{ secrets.DT_OAUTH_CLIENT_SECRET }}
        run: |
          TOKEN_RESP=/tmp/dt_token.json
          
          HTTP_STATUS=$(curl \
            --silent \
            --output "${TOKEN_RESP}" \
            --write-out "%{http_code}" \
            --request POST \
            --url "https://sso.dynatrace.com/sso/oauth2/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${DT_OAUTH_CLIENT_ID}" \
            --data-urlencode "client_secret=${DT_OAUTH_CLIENT_SECRET}" \
            --data-urlencode "scope=storage:lookup-tables:read storage:lookup-tables:write")
          
          echo "Token endpoint HTTP status: ${HTTP_STATUS}"
          
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::Failed to obtain access token (HTTP ${HTTP_STATUS})."
            cat "${TOKEN_RESP}"
            exit 1
          fi
          
          TOKEN=$(jq -r '.access_token // empty' < "${TOKEN_RESP}")
          
          if [ -z "${TOKEN}" ]; then
            echo "::error::Token response did not contain access_token."
            cat "${TOKEN_RESP}"
            exit 1
          fi
          
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Build request JSON and upload lookup table
        env:
          DT_ENVIRONMENT_URL: ${{ secrets.DT_ENVIRONMENT_URL }}
          BEARER_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          REPO_FILE="${{ inputs.repo_file_path }}"

          if [ ! -f "${REPO_FILE}" ]; then
            echo "::error::File not found: ${REPO_FILE}"
            exit 1
          fi

          # Build required fields
          REQUEST_JSON=$(jq -n \
            --arg filePath "${{ inputs.grail_file_path }}" \
            --arg parsePattern "${{ inputs.parse_pattern }}" \
            --arg lookupField "${{ inputs.lookup_field }}" \
            --argjson overwrite "${{ inputs.overwrite }}" \
            --argjson skippedRecords "${{ inputs.skipped_records }}" \
            --argjson autoFlatten "${{ inputs.auto_flatten }}" \
            '{
              filePath: $filePath,
              parsePattern: $parsePattern,
              lookupField: $lookupField,
              overwrite: $overwrite,
              skippedRecords: $skippedRecords,
              autoFlatten: $autoFlatten
            }')

          # Append optional fields only when provided
          DISPLAY_NAME="${{ inputs.display_name }}"
          DESCRIPTION="${{ inputs.description }}"
          TIMEZONE="${{ inputs.timezone }}"
          LOCALE="${{ inputs.locale }}"

          [ -n "${DISPLAY_NAME}" ] && REQUEST_JSON=$(echo "${REQUEST_JSON}" | jq --arg v "${DISPLAY_NAME}" '. + {displayName: $v}')
          [ -n "${DESCRIPTION}" ]  && REQUEST_JSON=$(echo "${REQUEST_JSON}" | jq --arg v "${DESCRIPTION}"  '. + {description: $v}')
          [ -n "${TIMEZONE}" ]     && REQUEST_JSON=$(echo "${REQUEST_JSON}" | jq --arg v "${TIMEZONE}"     '. + {timezone: $v}')
          [ -n "${LOCALE}" ]       && REQUEST_JSON=$(echo "${REQUEST_JSON}" | jq --arg v "${LOCALE}"       '. + {locale: $v}')

          echo "Request parameters: ${REQUEST_JSON}"
          echo "Uploading '${REPO_FILE}' to Grail path '${{ inputs.grail_file_path }}'..."

          HTTP_STATUS=$(curl \
            --silent \
            --output /tmp/dt_response.json \
            --write-out "%{http_code}" \
            --request POST \
            --url "${DT_ENVIRONMENT_URL}/platform/storage/resource-store/v1/files/tabular/lookup:upload" \
            --header "Authorization: Bearer ${BEARER_TOKEN}" \
            --form "request=${REQUEST_JSON};type=application/json" \
            --form "content=@${REPO_FILE};type=text/plain")

          echo "HTTP status: ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::Upload failed with HTTP ${HTTP_STATUS}"
            cat /tmp/dt_response.json
            exit 1
          fi

          echo "Lookup table uploaded successfully to '${{ inputs.grail_file_path }}'."
          cat /tmp/dt_response.json

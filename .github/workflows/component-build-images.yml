on:
  workflow_call:
    inputs:
      push:
        description: Should the images be pushed
        default: false
        required: false
        type: boolean
      version:
        description: The version used when tagging the image
        default: 'dev'
        required: false
        type: string
      dockerhub_repo:
        description: Docker Hub repository
        default: 'aericjw/opentelemetry-demo'
        required: false
        type: string
      ghcr_repo:
        description: GHCR repository
        default: 'ghcr.io/aericjw/opentelemetry-demo'
        required: false
        type: string

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          # Force git-based detection so this reusable workflow does not require
          # the 'pull-requests: read' permission to be granted by its callers.
          token: ''
          # Each filter is named after the matrix tag_suffix it guards and lists
          # every path whose change should trigger a rebuild of that image:
          # the service source tree plus any shared inputs its Dockerfile copies
          # (pb/, src/shared/, src/flagd/, telemetry-schema/) or build args it
          # consumes from .env.
          filters: |
            accounting:
              - 'src/accounting/**'
              - 'pb/**'
            ad:
              - 'src/ad/**'
              - 'pb/**'
              - '.env'
            agent:
              - 'src/agent/**'
              - 'src/shared/**'
            cart:
              - 'src/cart/**'
              - 'pb/**'
            chatbot:
              - 'src/chatbot/**'
            checkout:
              - 'src/checkout/**'
            currency:
              - 'src/currency/**'
              - 'pb/**'
              - '.env'
            email:
              - 'src/email/**'
            flagd-ui:
              - 'src/flagd-ui/**'
              - 'src/flagd/**'
            fraud-detection:
              - 'src/fraud-detection/**'
              - 'pb/**'
              - '.env'
            frontend:
              - 'src/frontend/**'
            frontend-proxy:
              - 'src/frontend-proxy/**'
            frontend-tests:
              - 'src/frontend/**'
            image-provider:
              - 'src/image-provider/**'
            kafka:
              - 'src/kafka/**'
              - '.env'
            llm:
              - 'src/llm/**'
            load-generator:
              - 'src/load-generator/**'
            mcp:
              - 'src/mcp/**'
              - 'src/shared/**'
            opensearch:
              - 'src/opensearch/**'
            payment:
              - 'src/payment/**'
              - 'pb/**'
            product-catalog:
              - 'src/product-catalog/**'
            product-reviews:
              - 'src/product-reviews/**'
            quote:
              - 'src/quote/**'
            recommendation:
              - 'src/recommendation/**'
            shipping:
              - 'src/shipping/**'
            telemetry-docs:
              - 'src/telemetry-docs/**'
              - 'telemetry-schema/**'
            traceBasedTests:
              - 'test/tracetesting/**'
              - '.env'

  protobufcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Generate
        run: make clean docker-generate-protobuf
      - name: Check Clean Work Tree
        run: make check-clean-work-tree

  build_and_push_images:
    runs-on: ubuntu-latest
    needs: [protobufcheck, changes]

    permissions:
      contents: read
      packages: write

    env:
      RELEASE_VERSION: "${{ github.event.release.tag_name }}"
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    strategy:
      fail-fast: false
      matrix:
        file_tag:
          - file: ./src/accounting/Dockerfile
            tag_suffix: accounting
            context: ./
            setup-qemu: true
          - file: ./src/ad/Dockerfile
            tag_suffix: ad
            context: ./
            setup-qemu: true
          - file: ./src/agent/Dockerfile
            tag_suffix: agent
            context: ./
            setup-qemu: true
          - file: ./src/cart/src/Dockerfile
            tag_suffix: cart
            context: ./
            setup-qemu: false
          - file: ./src/chatbot/Dockerfile
            tag_suffix: chatbot
            context: ./
            setup-qemu: true
          - file: ./src/checkout/Dockerfile
            tag_suffix: checkout
            context: ./
            setup-qemu: true
          - file: ./src/currency/Dockerfile
            tag_suffix: currency
            context: ./
            setup-qemu: true
          - file: ./src/email/Dockerfile
            tag_suffix: email
            context: ./
            setup-qemu: true
          - file: ./src/flagd-ui/Dockerfile
            tag_suffix: flagd-ui
            context: ./
            setup-qemu: true
          - file: ./src/fraud-detection/Dockerfile
            tag_suffix: fraud-detection
            context: ./
            setup-qemu: true
          - file: ./src/frontend/Dockerfile
            tag_suffix: frontend
            context: ./
            setup-qemu: true
          - file: ./src/frontend-proxy/Dockerfile
            tag_suffix: frontend-proxy
            context: ./
            setup-qemu: true
          - file: ./src/frontend/Dockerfile.cypress
            tag_suffix: frontend-tests
            context: ./
            setup-qemu: true
          - file: ./src/image-provider/Dockerfile
            tag_suffix: image-provider
            context: ./
            setup-qemu: true
          - file: ./src/kafka/Dockerfile
            tag_suffix: kafka
            context: ./
            setup-qemu: true
          - file: ./src/llm/Dockerfile
            tag_suffix: llm
            context: ./
            setup-qemu: true
          - file: ./src/load-generator/Dockerfile
            tag_suffix: load-generator
            context: ./
            setup-qemu: true
          - file: ./src/mcp/Dockerfile
            tag_suffix: mcp
            context: ./
            setup-qemu: true
          - file: ./src/opensearch/Dockerfile
            tag_suffix: opensearch
            context: ./
            setup-qemu: true
          - file: ./src/payment/Dockerfile
            tag_suffix: payment
            context: ./
            setup-qemu: true
          - file: ./src/product-catalog/Dockerfile
            tag_suffix: product-catalog
            context: ./
            setup-qemu: true
          - file: ./src/product-reviews/Dockerfile
            tag_suffix: product-reviews
            context: ./
            setup-qemu: true
          - file: ./src/quote/Dockerfile
            tag_suffix: quote
            context: ./
            setup-qemu: true
          - file: ./src/recommendation/Dockerfile
            tag_suffix: recommendation
            context: ./
            setup-qemu: true
          - file: ./src/shipping/Dockerfile
            tag_suffix: shipping
            context: ./
            setup-qemu: true
          - file: ./src/telemetry-docs/Dockerfile
            tag_suffix: telemetry-docs
            context: ./
            setup-qemu: true
          - file: ./test/tracetesting/Dockerfile
            tag_suffix: traceBasedTests
            context: ./
            setup-qemu: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Load environment variables from .env file
        run: |
          if [ -f .env ]; then
            # Filter out comments and empty lines, then add each variable to $GITHUB_ENV
            grep -vE '^\s*#|^\s*$' .env | while read -r line; do
              echo "$line" >> $GITHUB_ENV
            done
          else
            echo ".env file not found!"
            exit 1
          fi
      - name: Determine whether this service should be built
        id: should_build
        env:
          FORCE_PUSH: ${{ inputs.push }}
          SERVICE_CHANGED: ${{ contains(fromJSON(needs.changes.outputs.services), matrix.file_tag.tag_suffix) }}
          TAG_SUFFIX: ${{ matrix.file_tag.tag_suffix }}
        run: |
          # Always build when pushing (release/nightly/main) so every image is
          # published; otherwise only build images whose relevant sources changed.
          if [ "$FORCE_PUSH" = "true" ] || [ "$SERVICE_CHANGED" = "true" ]; then
            echo "Building $TAG_SUFFIX."
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "No relevant changes for $TAG_SUFFIX, skipping build."
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ inputs.push }}
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: ${{ inputs.push && env.DOCKER_USERNAME != '' }}
      - name: Set up QEMU
        if: ${{ steps.should_build.outputs.result == 'true' && matrix.file_tag.setup-qemu }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
        with:
          image: tonistiigi/binfmt:master
      - name: Set up Docker Buildx
        if: steps.should_build.outputs.result == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
            max-parallelism = 2
      - name: Matrix Build and push demo images
        if: steps.should_build.outputs.result == 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ${{ matrix.file_tag.context }}
          file: ${{ matrix.file_tag.file }}
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          build-args: |
            OTEL_JAVA_AGENT_VERSION=${{ env.OTEL_JAVA_AGENT_VERSION }}
            OPENTELEMETRY_CPP_VERSION=${{ env.OPENTELEMETRY_CPP_VERSION }}
            TRACETEST_IMAGE_VERSION=${{ env.TRACETEST_IMAGE_VERSION }}
            OPENSEARCH_IMAGE=${{ env.OPENSEARCH_IMAGE }}
          tags: |
            ${{ inputs.dockerhub_repo }}:${{ inputs.version }}-${{matrix.file_tag.tag_suffix }}
            ${{ inputs.dockerhub_repo }}:latest-${{matrix.file_tag.tag_suffix }}
            ${{ inputs.ghcr_repo }}:${{ inputs.version }}-${{ matrix.file_tag.tag_suffix }}
            ${{ inputs.ghcr_repo }}:latest-${{ matrix.file_tag.tag_suffix }}
          cache-from: type=gha
          cache-to: type=gha

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  DOCKERHUB_REPO: 'aericjw/opentelemetry-demo'
  GHCR_REPO: 'ghcr.io/aericjw/opentelemetry-demo'
  IMAGE_VERSION: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), 'main', 'dev')]
  PUSH_IMAGES: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]

stages:

  # ── Code Quality Checks ────────────────────────────────────────────────────

  - stage: Checks
    displayName: Code Quality Checks
    jobs:

      - job: markdownlint
        displayName: Markdown Lint
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: npm install
            displayName: Install dependencies
          - script: make markdownlint
            displayName: Run markdownlint

      - job: yamllint
        displayName: YAML Lint
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
            displayName: Set up Python
          - script: make install-yamllint
            displayName: Install yamllint
          - script: yamllint . --strict
            displayName: Run yamllint

      - job: misspell
        displayName: Spell Check
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: make misspell
            displayName: Run misspell

      - job: checklicense
        displayName: License Headers
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: make checklicense
            displayName: Run checklicense

      - job: sanity
        displayName: Sanity Check
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: python3 ./internal/tools/sanitycheck.py
            displayName: Run sanitycheck.py

      - job: weaver_check
        displayName: OTel Weaver Registry
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: |
              docker run --rm \
                --mount "type=bind,source=$(Build.SourcesDirectory)/telemetry-schema,target=/home/weaver/source,readonly" \
                otel/weaver:v0.22.1 \
                registry check -r source
            displayName: Run weaver registry check

      - job: checklinks
        displayName: Link Check (lychee)
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: Cache@2
            inputs:
              key: 'lychee | "$(Agent.OS)" | $(Build.SourcesDirectory)/.lychee.toml'
              path: $(Build.SourcesDirectory)/.lycheecache
            displayName: Restore lychee cache
          - script: |
              curl -sSL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz \
                | tar xz -C /usr/local/bin
              lychee --config .lychee.toml --cache --max-cache-age 3d --cache-exclude-status 300..=599 .
            displayName: Run lychee

  # ── Protobuf Consistency Check ─────────────────────────────────────────────

  - stage: ProtobufCheck
    displayName: Protobuf Check
    dependsOn: []
    jobs:
      - job: protobufcheck
        displayName: Protobuf Generation Check
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: make clean docker-generate-protobuf
            displayName: Generate protobuf
          - script: make check-clean-work-tree
            displayName: Check clean work tree

  # ── Docker Image Builds ────────────────────────────────────────────────────

  - stage: BuildImages
    displayName: Build Images
    dependsOn:
      - Checks
      - ProtobufCheck
    jobs:
      - job: build_images
        displayName: Build $(service.name)
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 60
        strategy:
          maxParallel: 6
          matrix:
            accounting:
              service.file: src/accounting/Dockerfile
              service.name: accounting
            ad:
              service.file: src/ad/Dockerfile
              service.name: ad
            cart:
              service.file: src/cart/src/Dockerfile
              service.name: cart
            checkout:
              service.file: src/checkout/Dockerfile
              service.name: checkout
            currency:
              service.file: src/currency/Dockerfile
              service.name: currency
            email:
              service.file: src/email/Dockerfile
              service.name: email
            flagd_ui:
              service.file: src/flagd-ui/Dockerfile
              service.name: flagd-ui
            fraud_detection:
              service.file: src/fraud-detection/Dockerfile
              service.name: fraud-detection
            frontend:
              service.file: src/frontend/Dockerfile
              service.name: frontend
            frontend_proxy:
              service.file: src/frontend-proxy/Dockerfile
              service.name: frontend-proxy
            frontend_tests:
              service.file: src/frontend/Dockerfile.cypress
              service.name: frontend-tests
            image_provider:
              service.file: src/image-provider/Dockerfile
              service.name: image-provider
            kafka:
              service.file: src/kafka/Dockerfile
              service.name: kafka
            llm:
              service.file: src/llm/Dockerfile
              service.name: llm
            load_generator:
              service.file: src/load-generator/Dockerfile
              service.name: load-generator
            opensearch:
              service.file: src/opensearch/Dockerfile
              service.name: opensearch
            payment:
              service.file: src/payment/Dockerfile
              service.name: payment
            product_catalog:
              service.file: src/product-catalog/Dockerfile
              service.name: product-catalog
            product_reviews:
              service.file: src/product-reviews/Dockerfile
              service.name: product-reviews
            quote:
              service.file: src/quote/Dockerfile
              service.name: quote
            recommendation:
              service.file: src/recommendation/Dockerfile
              service.name: recommendation
            shipping:
              service.file: src/shipping/Dockerfile
              service.name: shipping
            telemetry_docs:
              service.file: src/telemetry-docs/Dockerfile
              service.name: telemetry-docs
            trace_based_tests:
              service.file: test/tracetesting/Dockerfile
              service.name: traceBasedTests

        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              if [ -f .env ]; then
                grep -vE '^\s*#|^\s*$' .env | while read -r line; do
                  echo "##vso[task.setvariable variable=${line%%=*}]${line#*=}"
                done
              else
                echo ".env file not found!" && exit 1
              fi
            displayName: Load .env variables

          # Skip build if no changes in the service directory (PR builds only)
          - script: |
              DOCKERFILE_DIR=$(dirname $(service.file))
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                FILES_CHANGED=$(git diff --name-only origin/$(System.PullRequest.TargetBranch)...HEAD -- "$DOCKERFILE_DIR")
                if [ -z "$FILES_CHANGED" ]; then
                  echo "No changes in $DOCKERFILE_DIR, skipping build."
                  echo "##vso[task.setvariable variable=SKIP_BUILD]true"
                else
                  echo "Changes detected in $DOCKERFILE_DIR, building."
                  echo "##vso[task.setvariable variable=SKIP_BUILD]false"
                fi
              else
                echo "##vso[task.setvariable variable=SKIP_BUILD]false"
              fi
            displayName: Check for changes

          - script: |
              docker run --rm --privileged tonistiigi/binfmt --install all
              docker buildx create --use --name multiplatform --driver docker-container
            displayName: Set up Docker Buildx
            condition: eq(variables['SKIP_BUILD'], 'false')

          # Log in to GHCR (push on main only)
          # Requires a service connection named 'ghcr-service-connection' of type Docker Registry
          - task: Docker@2
            displayName: Log in to GHCR
            condition: and(eq(variables['SKIP_BUILD'], 'false'), eq(variables['PUSH_IMAGES'], 'true'))
            inputs:
              containerRegistry: ghcr-service-connection
              command: login

          # Log in to Docker Hub (push on main only, requires DOCKER_USERNAME secret variable)
          - task: Docker@2
            displayName: Log in to Docker Hub
            condition: and(eq(variables['SKIP_BUILD'], 'false'), eq(variables['PUSH_IMAGES'], 'true'), ne(variables['DOCKER_USERNAME'], ''))
            inputs:
              containerRegistry: dockerhub-service-connection
              command: login

          - script: |
              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --file $(service.file) \
                --build-arg OTEL_JAVA_AGENT_VERSION=$(OTEL_JAVA_AGENT_VERSION) \
                --build-arg OPENTELEMETRY_CPP_VERSION=$(OPENTELEMETRY_CPP_VERSION) \
                --build-arg TRACETEST_IMAGE_VERSION=$(TRACETEST_IMAGE_VERSION) \
                --build-arg OPENSEARCH_IMAGE=$(OPENSEARCH_IMAGE) \
                --tag $(GHCR_REPO):$(IMAGE_VERSION)-$(service.name) \
                --tag $(GHCR_REPO):latest-$(service.name) \
                --tag $(DOCKERHUB_REPO):$(IMAGE_VERSION)-$(service.name) \
                --tag $(DOCKERHUB_REPO):latest-$(service.name) \
                --push \
                .
            displayName: Build and push $(service.name) (main)
            condition: and(eq(variables['SKIP_BUILD'], 'false'), eq(variables['PUSH_IMAGES'], 'true'))

          - script: |
              docker buildx build \
                --platform linux/amd64 \
                --file $(service.file) \
                --build-arg OTEL_JAVA_AGENT_VERSION=$(OTEL_JAVA_AGENT_VERSION) \
                --build-arg OPENTELEMETRY_CPP_VERSION=$(OPENTELEMETRY_CPP_VERSION) \
                --build-arg TRACETEST_IMAGE_VERSION=$(TRACETEST_IMAGE_VERSION) \
                --build-arg OPENSEARCH_IMAGE=$(OPENSEARCH_IMAGE) \
                --tag $(GHCR_REPO):dev-$(service.name) \
                .
            displayName: Build $(service.name) (PR, no push)
            condition: and(eq(variables['SKIP_BUILD'], 'false'), eq(variables['PUSH_IMAGES'], 'false'))

  # ── Integration Tests ──────────────────────────────────────────────────────
  # Mirrors run-integration-tests.yml — run manually or via policy after review

  - stage: IntegrationTests
    displayName: Integration Tests
    dependsOn: BuildImages
    condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - job: tracetesting
        displayName: Trace-based Tests
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 90
        steps:
          - checkout: self
          - script: make build && docker system prune -f && make run-tracetesting
            displayName: Run trace-based tests
